# ===================================================================
# DynaPyt CallGraph — Pillow
#
# Add this to your fork of python-pillow/Pillow:
#   .github/workflows/dynapyt-callgraph.yml
#
# Triggers: manual (workflow_dispatch)
# Artifacts: dynapyt.json (call graph)
# ===================================================================

name: DynaPyt CallGraph

on:
  workflow_dispatch:

jobs:
  callgraph:
    runs-on: ubuntu-latest
    timeout-minutes: 60*12
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev libtiff-dev libfreetype-dev liblcms2-dev libwebp-dev libharfbuzz-dev libfribidi-dev libopenjp2-7-dev

      - name: Install project dependencies
        run: |
          pip install pytest
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            pip install -e ".[tests]" 2>/dev/null || pip install -e "." 2>/dev/null || true
          fi

      - name: Setup DynaPyt
        uses: clonedSemicolon/seytup-dynapyt@master
        with:
          directory: src

      - name: Run tests
        run: pytest Tests -v

      - name: Upload DynaPyt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynapyt-pillow
          path: dynapyt.json
          retention-days: 30
